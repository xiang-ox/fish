<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安静养鱼系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <img src="images/背景.jpg" alt="海底世界" class="background-image">
    </div>

    <div class="main-container">
        <!-- 标题行 -->
        <header class="title-section">
            <h1 class="main-title">安静养鱼系统</h1>
        </header>

        <!-- 游戏规则行 -->
        <section class="rules-section">
            <div class="rules-content">
                <p>游戏规则：每安静1分钟，获得一条当前等级对应的小鱼；分贝每超过阈值一次，失去一条小鱼；每获得5条小鱼，自动合成为一条小鱼并变身。游戏开始为1级，每变身1次升1级，共30级。</p>
            </div>
        </section>

        <!-- 状态信息行 -->
        <section class="status-section">
            <div class="status-item">
                <span class="status-label">本次安静时间</span>
                <span class="status-value" id="current-quiet-time">00:00</span>
            </div>
            <div class="status-item">
                <span class="status-label">生成下一条小鱼剩余</span>
                <span class="status-value" id="next-fish-time">60秒</span>
            </div>
            <div class="status-item center">
                <span class="status-label">当前等级</span>
                <span class="status-value" id="current-level">LV1 海胆</span>
            </div>
            <div class="status-item">
                <span class="status-label">已有鱼的条数</span>
                <span class="status-value" id="fish-count">0</span>
            </div>
            <div class="status-item">
                <span class="status-label">累计安静时间</span>
                <span class="status-value" id="total-quiet-time">00:00</span>
            </div>
        </section>

        <!-- 主内容区 -->
        <div class="content-area">
            <!-- 左侧控制面板 -->
            <aside class="control-panel">
                <div class="control-item">
                    <span class="control-label">当前分贝</span>
                    <span class="control-value" id="current-db">0 dB</span>
                </div>

                <div class="control-item">
                    <span class="control-label">阈值设置</span>
                    <input type="range" id="threshold-slider" min="0" max="100" value="50">
                    <span class="slider-value" id="threshold-value">50</span>
                </div>

                <div class="control-item buttons">
                    <button id="start-btn" class="btn btn-primary">开始</button>
                    <button id="pause-btn" class="btn btn-secondary" disabled>暂停</button>
                </div>

                <div class="control-item">
                    <button id="reset-btn" class="btn btn-warning">重置</button>
                </div>

                <div class="control-item">
                    <button id="history-btn" class="btn btn-info">历史记录</button>
                </div>

                <div class="control-item">
                    <button id="settings-btn" class="btn btn-info">麦克风设置</button>
                </div>

                <div class="control-item">
                    <button id="fullscreen-btn" class="btn btn-info">全屏</button>
                </div>
            </aside>

            <!-- 右侧养鱼区域 -->
            <main class="fish-tank" id="fish-tank">
                <!-- 鱼会动态生成在这里 -->
            </main>
        </div>
    </div>

    <!-- 升级弹窗 -->
    <div class="upgrade-popup" id="upgrade-popup">
        <div class="popup-content">
            <p id="upgrade-message">升级成功！</p>
        </div>
    </div>

    <!-- 历史记录弹窗 -->
    <div class="modal" id="history-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>历史记录（30天）</h2>
                <button class="close-btn" id="close-history">&times;</button>
            </div>
            <div class="modal-body">
                <div class="history-list" id="history-list">
                    <!-- 历史记录动态生成 -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="clear-history" class="btn btn-warning">清空历史</button>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="close-btn" id="close-settings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label for="mic-select">选择麦克风：</label>
                    <select id="mic-select">
                        <option value="">默认麦克风</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
